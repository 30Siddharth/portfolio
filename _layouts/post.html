<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..400&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} — Siddharth Singh</title>
    <meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 }}">
    <link rel="stylesheet" href="/portfolio/goo.css">
    <style>
        /* ===== Blog post specific styles ===== */
        .post-header {
            max-width: 600px;
            width: 100%;
            margin-bottom: 10px;
        }

        .post-title {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            color: #333;
            margin: 10px 0 6px 0;
            text-align: left;
        }

        .post-meta {
            font-size: 0.9em;
            color: #777;
            margin-bottom: 20px;
        }

        .post-content {
            max-width: 600px;
            width: 100%;
        }

        .post-content h1,
        .post-content h2,
        .post-content h3,
        .post-content h4 {
            font-family: 'Playfair Display', serif;
            color: #333;
            margin: 28px 0 10px 0;
            text-align: left;
        }

        .post-content h2 { font-size: 1.6em; }
        .post-content h3 { font-size: 1.3em; color: #2977c0; }

        .post-content p {
            font-size: 1.1em;
            line-height: 1.7;
            margin: 12px 0;
            text-align: justify;
            hyphens: auto;
        }

        .post-content ul,
        .post-content ol {
            padding-left: 40px;
            font-size: 1.1em;
            margin: 10px 0;
        }

        .post-content li {
            margin-bottom: 6px;
            line-height: 1.6;
        }

        .post-content blockquote {
            border-left: 3px solid #2977c0;
            margin: 20px 0;
            padding: 8px 20px;
            color: #555;
            font-style: italic;
            background: #f9f9f9;
        }

        .post-content code {
            font-family: 'Courier New', monospace;
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.95em;
        }

        .post-content pre {
            background: #f4f4f4;
            padding: 16px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .post-content pre code {
            background: none;
            padding: 0;
        }

        .post-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 20px auto;
        }

        .back-link {
            max-width: 600px;
            width: 100%;
            margin-bottom: 20px;
            font-size: 0.95em;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <div class="nav">
        <a href="/portfolio/index.html">Home</a>
        <a href="/portfolio/news.html">News</a>
        <a href="/portfolio/publications.html">Publications</a>
        <a href="/portfolio/projects.html">Projects</a>
        <a href="/portfolio/blog/index.html">Blog</a>
    </div>

    <div class="back-link">
        <a href="/portfolio/blog/index.html">&larr; Back to Blog</a>
    </div>

    <div class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}{% if page.tags.size > 0 %} &middot; {{ page.tags | join: ", " }}{% endif %}</p>
        <hr class="sub-section-divider">
    </div>

    <div class="post-content">
        {{ content }}
    </div>

    <hr class="section-divider" style="max-width:600px;">

    <div style="max-width:600px; width:100%; margin-bottom: 40px;">
        <a href="/portfolio/blog/index.html">&larr; Back to Blog</a>
    </div>

</body>
</html>
